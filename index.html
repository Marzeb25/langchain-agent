<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marzeb Agent UI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .user-message {
            background-color: #1e1f20;
            padding: 1rem 1.5rem;
            border-radius: 1.5rem;
            max-width: 80%;
            margin-left: auto;
        }
        .bot-message {
            max-width: 100%;
        }
        .thought-process {
            background-color: #1a1a1a;
            border-left: 4px solid #8ab4f8;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            font-size: 0.9em;
            color: #a8c7fa;
        }
        .thought-process summary {
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }
        #input-container {
            padding: 1.5rem;
            background-color: #131314;
            display: flex;
            justify-content: center;
        }
        .input-box {
            display: flex;
            width: 100%;
            max-width: 800px;
            background-color: #1e1f20;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
        }
        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.8rem;
            outline: none;
        }
        button {
            background-color: transparent;
            color: #8ab4f8;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 0 1rem;
            font-size: 1rem;
        }
        button:hover {
            color: #aecbfa;
        }
        /* Style adjustments for marked.js elements */
        pre { background-color: #1e1f20; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        code { font-family: monospace; }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <div id="input-container">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Configure Marked.js to use Highlight.js for code blocks
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatContainer = document.getElementById('chat-container');

            // 1. Render User Message
            chatContainer.innerHTML += `
                <div class="message user-message">
                    ${message}
                </div>
            `;
            inputField.value = '';

            // 2. Setup Bot Message placeholders
            const botMessageId = 'bot-' + Date.now();
            chatContainer.innerHTML += `
                <div class="message bot-message" id="${botMessageId}">
                    <details class="thought-process" style="display: none;">
                        <summary>Thinking Process</summary>
                        <div class="thought-content"></div>
                    </details>
                    <div class="final-answer"></div>
                </div>
            `;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            const botContainer = document.getElementById(botMessageId);
            const thoughtDetails = botContainer.querySelector('.thought-process');
            const thoughtContent = botContainer.querySelector('.thought-content');
            const finalAnswer = botContainer.querySelector('.final-answer');

            let thoughtText = '';
            let answerText = '';

            // 3. Fetch stream from backend
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = '';

                // Read the stream chunk by chunk
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete lines in buffer

                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.substring(6);
                            if (dataStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(dataStr);
                                
                                // Append and render based on chunk type
                                if (data.type === 'thought') {
                                    thoughtDetails.style.display = 'block'; // Show thinking UI
                                    thoughtText += data.content;
                                    thoughtContent.innerHTML = marked.parse(thoughtText);
                                } else if (data.type === 'text') {
                                    answerText += data.content;
                                    finalAnswer.innerHTML = marked.parse(answerText);
                                }
                                
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } catch (e) {
                                console.error("Error parsing stream data:", e);
                            }
                        }
                    }
                }
            } catch (error) {
                finalAnswer.innerHTML = "<em>Error connecting to the model.</em>";
            }
        }
    </script>
</body>
</html>
